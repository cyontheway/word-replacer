<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word 敏感词替换工具 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6F68B7',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        success: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                        },
                        warning: {
                            50: '#fffbeb',
                            500: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .drag-active {
            border-color: #6F68B7 !important;
            background-color: #f5f3ff !important;
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c4b5fd;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a78bfa;
        }
        /* 高亮样式 - 手动规则：紫色系深浅 */
        .highlight-excel-original {
            background-color: #d8b4fe;  /* purple-300 深一点的浅紫 */
            padding: 1px 2px;
            border-radius: 2px;
        }
        .highlight-excel-replaced {
            background-color: #a855f7;  /* purple-500 深紫 */
            color: white;
            padding: 1px 2px;
            border-radius: 2px;
        }
        /* 高亮样式 - 正则规则：原来的黄色和绿色 */
        .highlight-regex-original {
            background-color: #fef08a;  /* yellow-200 */
            padding: 1px 2px;
            border-radius: 2px;
        }
        .highlight-regex-replaced {
            background-color: #86efac;  /* green-300 */
            padding: 1px 2px;
            border-radius: 2px;
        }
        /* 同步滚动容器 */
        .preview-panel {
            height: calc(100vh - 280px);
            overflow-y: auto;
        }
        /* 左侧栏固定高度 */
        .left-panel {
            height: calc(100vh - 180px);
            overflow-y: auto;
        }
        /* 可收缩侧边栏 */
        .sidebar-collapsed .sidebar-content { display: none; }
        .sidebar-collapsed .sidebar-toggle-icon { transform: rotate(180deg); }
        .sidebar-toggle { transition: all 0.2s; }
        .sidebar-collapsed .sidebar-header { justify-content: center; }
        .sidebar-collapsed { width: 3rem !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-primary-50 via-white to-primary-100 min-h-screen">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-6">
        <!-- Header - 压缩版 -->
        <header class="flex items-center gap-3 mb-4 animate-fade-in">
            <div class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-primary-700 shadow-md">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h1 class="text-lg font-semibold text-gray-900">Word 敏感词替换工具</h1>
        </header>

        <!-- 左右两栏布局 -->
        <div class="flex gap-4" id="mainLayout">

            <!-- 左侧：主内容区 -->
            <main class="flex-1 space-y-3">
                <!-- 顶部操作栏：左边上传+预览，右边统计+下载 -->
                <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
                    <div class="flex items-center justify-between gap-4">
                        <!-- 左侧：上传 + 预览按钮 -->
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <input type="file" id="fileInput" accept=".docx" multiple class="hidden">
                                <button onclick="document.getElementById('fileInput').click()" class="px-4 py-2 bg-primary-100 text-primary-700 text-sm font-medium rounded-lg hover:bg-primary-200 transition-colors flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    上传文档
                                </button>
                            </div>
                            <button id="processBtn" disabled class="px-4 py-2 bg-primary-700 text-white text-sm font-medium rounded-lg hover:bg-primary-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                <span id="btnText">预览替换</span>
                            </button>
                            <div id="fileList" class="text-xs text-gray-600"></div>
                        </div>

                        <!-- 右侧：统计 + 下载 -->
                        <div class="flex items-center gap-3">
                            <div id="statsDisplay" class="hidden flex items-center gap-2 text-xs">
                                <span class="text-gray-500">已匹配:</span>
                                <span id="statsText" class="font-medium text-primary-700"></span>
                            </div>
                            <button id="downloadBtn" class="hidden px-4 py-2 bg-success-500 text-white text-sm font-medium rounded-lg hover:bg-success-600 transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                                下载文档
                            </button>
                        </div>
                    </div>

                    <!-- 进度条 -->
                    <div id="progressContainer" class="hidden mt-3">
                        <div class="h-1.5 bg-gray-200 rounded-full overflow-hidden">
                            <div id="progressFill" class="h-full bg-primary-700 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </section>

                <!-- 对比预览 -->
                <section id="previewCard" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-1 h-4 bg-primary-700 rounded-full"></div>
                        <h2 class="text-sm font-semibold text-gray-900">对比预览</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <div class="text-xs text-gray-400 mb-1 flex items-center gap-1">
                                <span class="w-2 h-2 bg-yellow-200 rounded"></span> 原文
                            </div>
                            <div id="originalPreview" class="preview-panel bg-gray-50 rounded-lg p-3 text-xs leading-relaxed border"></div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-400 mb-1 flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-200 rounded"></span> 替换后
                            </div>
                            <div id="replacedPreview" class="preview-panel bg-gray-50 rounded-lg p-3 text-xs leading-relaxed border"></div>
                        </div>
                    </div>
                </section>

            </main>

            <!-- 右侧栏：替换规则 + 命中项 (宽度增加1.5倍) -->
            <aside id="sidebar" class="w-[480px] shrink-0">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 space-y-4">
                    <!-- 替换规则 -->
                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-1 h-4 bg-primary-700 rounded-full"></div>
                                <h2 class="text-sm font-semibold text-gray-900">替换规则</h2>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <p class="text-xs font-medium text-gray-500 mb-2">自定义规则</p>
                            <div class="space-y-2" id="rulesContainer">
                                <div class="flex gap-2 items-center">
                                    <input type="text" class="rule-old flex-1 min-w-0 h-8 px-2 border border-gray-300 rounded text-sm" placeholder="原词">
                                    <input type="text" class="rule-new flex-1 min-w-0 h-8 px-2 border border-gray-300 rounded text-sm" placeholder="替换为">
                                    <button onclick="removeRuleRow(this)" class="shrink-0 text-gray-400 hover:text-red-500">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <button onclick="addRuleRow()" class="flex-1 text-xs text-primary-700 hover:text-primary-800 py-1">+ 添加规则</button>
                                <button onclick="document.getElementById('excelInput').click()" class="flex-1 text-xs text-primary-700 hover:text-primary-800 py-1 border border-primary-200 rounded">📊 导入Excel</button>
                                <input type="file" id="excelInput" accept=".xlsx,.xls" class="hidden">
                            </div>
                        </div>

                        <!-- 内置规则 -->
                        <div class="border-t border-gray-200 pt-3 mt-3">
                            <p class="text-xs font-medium text-gray-500 mb-2">内置脱敏规则</p>
                            <div class="flex flex-wrap gap-1.5">
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">手机号</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">身份证</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">银行卡</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">公司名</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">银行名</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">地址</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">邮箱</span>
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">座机</span>
                            </div>
                        </div>
                    </div>

                    <!-- 命中项列表（独立区块，加长） -->
                    <div id="sidebarPreview" class="hidden border-t border-gray-200 pt-3">
                        <p class="text-xs font-medium text-gray-500 mb-2">命中项</p>
                        <div id="matchList" class="max-h-96 overflow-y-auto space-y-1 text-xs"></div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer -->
        <footer class="text-center py-8 text-gray-500 text-sm">
            <p>Made with care by word-replacer v3.0</p>
        </footer>
    </div>

    <script>
        // Global state
        let selectedFiles = [];
        let processedFiles = [];
        let previewData = null;
        let sidebarCollapsed = false;
        let selectedMatchIds = new Set(); // 用户选中的匹配项ID

        // 侧边栏收缩
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebarCollapsed = !sidebarCollapsed;
            if (sidebarCollapsed) {
                sidebar.classList.add('sidebar-collapsed');
                sidebar.classList.remove('w-96');
            } else {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('w-96');
            }
        }

        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const btnText = document.getElementById('btnText');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const rulesContainer = document.getElementById('rulesContainer');
        // v3: 预览相关元素
        const previewCard = document.getElementById('previewCard');
        const statsDisplay = document.getElementById('statsDisplay');
        const statsText = document.getElementById('statsText');
        const downloadBtn = document.getElementById('downloadBtn');
        const matchList = document.getElementById('matchList');
        const originalPreview = document.getElementById('originalPreview');
        const replacedPreview = document.getElementById('replacedPreview');

        // File input event
        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
        });

        // Add files
        function addFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            renderFileList();
            processBtn.disabled = selectedFiles.length === 0;
        }

        // Render file list
        function renderFileList() {
            if (selectedFiles.length === 0) {
                fileList.textContent = '';
                fileList.classList.add('hidden');
                return;
            }

            fileList.classList.remove('hidden');
            // 清空并重新创建文件列表
            fileList.textContent = '';

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('span');
                fileItem.className = 'inline-flex items-center gap-1 bg-gray-100 rounded px-2 py-1';

                const fileName = document.createElement('span');
                fileName.textContent = file.name;
                fileName.className = 'text-xs';

                const removeBtn = document.createElement('button');
                removeBtn.textContent = '×';
                removeBtn.className = 'text-gray-500 hover:text-red-500 font-bold';
                removeBtn.onclick = () => removeFile(index);

                fileItem.appendChild(fileName);
                fileItem.appendChild(removeBtn);
                fileList.appendChild(fileItem);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Remove file
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
            processBtn.disabled = selectedFiles.length === 0;
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Add rule row (新版左侧栏)
        function addRuleRow() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center';
            div.innerHTML = `
                <input type="text" class="rule-old flex-1 min-w-0 h-8 px-2 border border-gray-300 rounded text-sm" placeholder="原词">
                <input type="text" class="rule-new flex-1 min-w-0 h-8 px-2 border border-gray-300 rounded text-sm" placeholder="替换为">
                <button onclick="removeRuleRow(this)" class="shrink-0 text-gray-400 hover:text-red-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            rulesContainer.appendChild(div);
        }

        // Remove rule row
        function removeRuleRow(btn) {
            if (rulesContainer.children.length > 1) {
                btn.closest('div').remove();
            } else {
                btn.closest('div').querySelectorAll('input').forEach(i => i.value = '');
            }
        }

        // Get rules from left panel
        function getRules() {
            const rules = [];
            rulesContainer.querySelectorAll('div').forEach(row => {
                const oldWord = row.querySelector('.rule-old')?.value.trim();
                const newWord = row.querySelector('.rule-new')?.value.trim();
                if (oldWord && newWord) {
                    rules.push({ '原词': oldWord, '替换词': newWord });
                }
            });
            return rules;
        }

        // v3: Preview files (先预览，再确认处理)
        processBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            processBtn.disabled = true;
            btnText.innerHTML = '<svg class="w-4 h-4 spinner inline-block mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 预览中...';

            const rules = getRules();
            const file = selectedFiles[0]; // v3: 先处理第一个文件的预览

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('rules', JSON.stringify(rules));

                const response = await fetch('/preview', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    previewData = result;
                    showPreview(result);
                    updateFileStatus(0, 'previewed');
                } else {
                    alert('预览失败: ' + result.error);
                }
            } catch (error) {
                alert('预览失败: ' + error.message);
            }

            processBtn.disabled = false;
            btnText.textContent = '预览替换';
        });

        // Update file status
        function updateFileStatus(index, status, errorMsg = '') {
            const fileItem = document.querySelector(`.file-item[data-index="${index}"]`);
            if (!fileItem) return;

            const badge = fileItem.querySelector('.status-badge');
            badge.className = 'status-badge inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium';

            switch (status) {
                case 'processing':
                    badge.classList.add('bg-primary-100', 'text-primary-700');
                    badge.innerHTML = '<svg class="w-3 h-3 spinner mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>处理中';
                    break;
                case 'done':
                    badge.classList.add('bg-success-100', 'text-success-600');
                    badge.textContent = '完成';
                    break;
                case 'previewed':
                    badge.classList.add('bg-primary-100', 'text-primary-700');
                    badge.textContent = '已预览';
                    break;
                case 'error':
                    badge.classList.add('bg-red-100', 'text-red-700');
                    badge.textContent = '失败';
                    if (errorMsg) console.error(`File ${index} error:`, errorMsg);
                    break;
            }
        }

        // Show stats
        function showStats(stats) {
            const statsCard = document.getElementById('statsCard');
            const statsGrid = document.getElementById('statsGrid');

            let detailsHtml = '';
            if (Object.keys(stats.regex_details).length > 0) {
                detailsHtml = Object.entries(stats.regex_details)
                    .map(([key, val]) => `
                        <div class="bg-gray-50 rounded-xl p-4 text-center border border-gray-200">
                            <div class="text-2xl font-bold text-primary-700">${val}</div>
                            <div class="text-sm text-gray-600 mt-1">${escapeHtml(key)}</div>
                        </div>
                    `).join('');
            }

            statsGrid.innerHTML = `
                <div class="bg-gray-50 rounded-xl p-4 text-center border border-gray-200">
                    <div class="text-2xl font-bold text-primary-700">${stats.excel_rules}</div>
                    <div class="text-sm text-gray-600 mt-1">自定义规则替换</div>
                </div>
                <div class="bg-gray-50 rounded-xl p-4 text-center border border-gray-200">
                    <div class="text-2xl font-bold text-primary-700">${stats.regex_total}</div>
                    <div class="text-sm text-gray-600 mt-1">内置规则脱敏</div>
                </div>
                ${detailsHtml}
            `;

            statsCard.classList.remove('hidden');
        }

        // Show downloads
        function showDownloads() {
            const downloadCard = document.getElementById('downloadCard');
            const downloadList = document.getElementById('downloadList');

            downloadList.innerHTML = processedFiles.map((file) => `
                <div class="bg-white rounded-xl p-4 border border-success-200 shadow-sm">
                    <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0 flex-1">
                            <p class="font-medium text-gray-900 truncate">${escapeHtml(file.originalName)}</p>
                            <p class="text-sm text-gray-500 mt-1">
                                Excel规则: ${file.stats.excel_rules}处 | 内置规则: ${file.stats.regex_total}处
                            </p>
                        </div>
                        <a
                            href="/download/${file.tempPath}"
                            download="${escapeHtml(file.downloadName)}"
                            class="inline-flex items-center gap-2 px-4 py-2 bg-success-600 text-white text-sm font-medium rounded-lg hover:bg-success-600/90 focus:outline-none focus:ring-2 focus:ring-success-500 focus:ring-offset-2 transition-colors shrink-0"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            下载
                        </a>
                    </div>
                </div>
            `).join('');

            downloadCard.classList.remove('hidden');
        }

        // v3: 显示预览
        function showPreview(data) {
            // 显示左侧栏预检报告
            const sidebarPreview = document.getElementById('sidebarPreview');
            sidebarPreview.classList.remove('hidden');

            // 显示右侧对比预览
            previewCard.classList.remove('hidden');

            // 统计摘要 - 显示在顶部右侧
            statsDisplay.classList.remove('hidden');
            const totalCount = Object.values(data.stats).reduce((sum, val) => sum + val, 0);
            statsText.textContent = `${totalCount} 项`;

            // 显示下载按钮
            downloadBtn.classList.remove('hidden');

            // 命中项列表
            renderMatchList(data.matches);

            // 对比预览
            renderComparePreview(data);

            // 同步滚动
            setupSyncScroll();
        }

        // v3: 选中匹配项管理函数
        function toggleMatchSelection(matchId, isChecked) {
            if (isChecked) {
                selectedMatchIds.add(matchId);
            } else {
                selectedMatchIds.delete(matchId);
            }
            updateSelectedCount();
            updatePreviewWithSelectedMatches(); // 实时更新预览
        }

        function toggleAllMatches(isChecked) {
            if (!previewData || !previewData.matches) return;

            if (isChecked) {
                previewData.matches.forEach(m => selectedMatchIds.add(m.id));
            } else {
                selectedMatchIds.clear();
            }

            // 更新所有复选框
            matchList.querySelectorAll('input[type="checkbox"]:not(#selectAllMatches)').forEach(cb => {
                cb.checked = isChecked;
            });

            updateSelectedCount();
            updatePreviewWithSelectedMatches(); // 实时更新预览
        }

        function updateSelectedCount() {
            const countElement = document.getElementById('selectedCount');
            if (countElement && previewData && previewData.matches) {
                const total = previewData.matches.length;
                const selected = selectedMatchIds.size;
                countElement.textContent = `${selected}/${total}`;

                // 更新全选复选框状态
                const selectAllCheckbox = document.getElementById('selectAllMatches');
                if (selectAllCheckbox) {
                    selectAllCheckbox.checked = selected === total;
                    selectAllCheckbox.indeterminate = selected > 0 && selected < total;
                }
            }
        }

        // v3: 渲染命中项列表（带复选框的可选列表）
        function renderMatchList(matches) {
            if (matches.length === 0) {
                matchList.innerHTML = '<div class="text-gray-500 text-xs">未检测到敏感信息</div>';
                return;
            }

            // 初始选中所有匹配项
            selectedMatchIds = new Set(matches.map(m => m.id));

            // 全选/全不选控制
            const selectAllHtml = `
                <div class="flex items-center justify-between mb-2 px-1">
                    <label class="flex items-center gap-1.5 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" id="selectAllMatches" checked
                               class="w-3 h-3 text-primary-700 rounded focus:ring-primary-500 focus:ring-1 focus:ring-offset-1"
                               onchange="toggleAllMatches(this.checked)">
                        <span>全选 (${matches.length} 项)</span>
                    </label>
                    <span class="text-xs text-primary-700 font-medium" id="selectedCount">${matches.length}/${matches.length}</span>
                </div>
            `;

            // 匹配项列表（限制显示30项）
            const matchesHtml = matches.slice(0, 30).map((m, i) => `
                <label class="flex items-start gap-2 p-1.5 bg-gray-50 rounded text-xs hover:bg-gray-100 cursor-pointer border border-transparent hover:border-gray-300">
                    <input type="checkbox"
                           class="mt-0.5 w-3 h-3 text-primary-700 rounded focus:ring-primary-500 focus:ring-1 focus:ring-offset-1"
                           value="${escapeHtml(m.id)}"
                           checked
                           onchange="toggleMatchSelection('${escapeHtml(m.id)}', this.checked)">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-1 mb-0.5">
                            <span class="px-1.5 py-0.5 bg-primary-100 text-primary-700 rounded text-xs">${escapeHtml(m.match_type)}</span>
                            <span class="text-red-500 line-through truncate">${escapeHtml(m.original)}</span>
                            <span class="text-gray-400 mx-0.5">→</span>
                            <span class="text-green-600 truncate">${escapeHtml(m.replacement)}</span>
                        </div>
                        <div class="text-gray-500 truncate text-[10px] leading-tight" title="${escapeHtml(m.context)}">
                            ${escapeHtml(m.context.length > 40 ? m.context.substring(0, 40) + '...' : m.context)}
                        </div>
                    </div>
                </label>
            `).join('');

            matchList.innerHTML = selectAllHtml + matchesHtml;

            if (matches.length > 30) {
                matchList.innerHTML += `<div class="text-gray-400 text-xs text-center py-1 border-t border-gray-200 mt-1">还有 ${matches.length - 30} 项未显示...</div>`;
            }
        }

        // v3: 渲染对比预览（高亮 - 手动规则用紫色系，正则规则用黄色系）
        // 可选参数：useFilter - 是否根据 selectedMatchIds 过滤匹配项
        function renderComparePreview(data, useFilter = true) {
            // 判断是否为手动规则（自定义规则）
            const isExcelRule = (matchType) => matchType === '自定义规则';

            // 左侧原文：高亮所有匹配项（不管是否选中）
            let originalHtml = escapeHtml(data.original_text);
            data.matches.forEach(m => {
                const escaped = escapeHtml(m.original);
                const cssClass = isExcelRule(m.match_type) ? 'highlight-excel-original' : 'highlight-regex-original';
                const highlighted = `<span class="${cssClass}">${escaped}</span>`;
                originalHtml = originalHtml.split(escaped).join(highlighted);
            });

            // 右侧：从原文开始，只替换选中的项
            let replacedHtml = escapeHtml(data.original_text);
            data.matches.forEach(m => {
                const isSelected = !useFilter || selectedMatchIds.has(m.id);
                const escapedOriginal = escapeHtml(m.original);

                if (isSelected) {
                    // 选中项：替换为绿色高亮的替换文本
                    const escapedReplacement = escapeHtml(m.replacement);
                    const cssClass = isExcelRule(m.match_type) ? 'highlight-excel-replaced' : 'highlight-regex-replaced';
                    const highlighted = `<span class="${cssClass}">${escapedReplacement}</span>`;
                    replacedHtml = replacedHtml.split(escapedOriginal).join(highlighted);
                } else {
                    // 未选中项：保持原文但用黄色高亮（表示未替换）
                    const cssClass = isExcelRule(m.match_type) ? 'highlight-excel-original' : 'highlight-regex-original';
                    const highlighted = `<span class="${cssClass}">${escapedOriginal}</span>`;
                    replacedHtml = replacedHtml.split(escapedOriginal).join(highlighted);
                }
            });

            originalPreview.innerHTML = originalHtml.replace(/\n/g, '<br>');
            replacedPreview.innerHTML = replacedHtml.replace(/\n/g, '<br>');
        }

        // 根据选中状态更新预览
        function updatePreviewWithSelectedMatches() {
            if (previewData) {
                renderComparePreview(previewData, true);
            }
        }

        // v3: 同步滚动
        function setupSyncScroll() {
            let isSyncing = false;
            originalPreview.addEventListener('scroll', () => {
                if (isSyncing) return;
                isSyncing = true;
                replacedPreview.scrollTop = originalPreview.scrollTop;
                isSyncing = false;
            });
            replacedPreview.addEventListener('scroll', () => {
                if (isSyncing) return;
                isSyncing = true;
                originalPreview.scrollTop = replacedPreview.scrollTop;
                isSyncing = false;
            });
        }

        // v3: 下载按钮 - 处理并下载文档
        downloadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            downloadBtn.disabled = true;
            downloadBtn.textContent = '处理中...';
            progressContainer.classList.remove('hidden');

            const rules = getRules();
            processedFiles = [];
            const stats = { excel_rules: 0, regex_total: 0, regex_details: {} };

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                updateFileStatus(i, 'processing');

                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('rules', JSON.stringify(rules));
                    // 发送用户选中的匹配项ID（后端暂时忽略，待实现）
                    formData.append('selectedMatches', JSON.stringify(Array.from(selectedMatchIds)));

                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success) {
                        processedFiles.push({
                            originalName: file.name,
                            downloadName: result.filename,
                            tempPath: result.temp_path,
                            stats: result.stats
                        });

                        stats.excel_rules += result.stats.excel_rules;
                        stats.regex_total += result.stats.regex_total;
                        Object.entries(result.stats.regex_details).forEach(([key, val]) => {
                            stats.regex_details[key] = (stats.regex_details[key] || 0) + val;
                        });

                        updateFileStatus(i, 'done');
                    } else {
                        updateFileStatus(i, 'error', result.error);
                    }
                } catch (error) {
                    updateFileStatus(i, 'error', error.message);
                }

                const progress = ((i + 1) / selectedFiles.length) * 100;
                progressFill.style.width = `${progress}%`;
            }

            // 处理完成后直接触发下载
            if (processedFiles.length > 0) {
                const file = processedFiles[0];
                window.location.href = `/download/${file.tempPath}`;
            }

            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> 下载文档';
            progressContainer.classList.add('hidden');
            progressFill.style.width = '0%';
        });
    </script>
</body>
</html>
